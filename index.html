    html, body { height: 100%; margin: 0; }
    body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #fff; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes pulse-glow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes float-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes star-drift { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100%) translateX(20px); opacity: 0; } }
    
    .animate-float { animation: float-up 0.6s ease-out forwards; opacity: 0; }
    .pulse-live { animation: pulse-glow 1.5s ease-in-out infinite; }
    
    .glass-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      transition: all 0.3s ease;
    }
    .glass-card:hover, .glass-card:active {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.15);
      transform: scale(1.02);
    }
    
    .digit-roller { display: inline-block; overflow: hidden; height: 1em; line-height: 1; vertical-align: bottom; }
    .digit-roller span { display: block; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
    
    .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: star-drift linear infinite; }
    
    .category-chip { white-space: nowrap; padding: 8px 16px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; font-size: 14px; }
    .category-chip.active, .category-chip:hover { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.5); }
    
    .bottom-nav { background: rgba(10,10,15,0.95); border-top: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(20px); }
    
    .fullscreen-overlay { position: fixed; inset: 0; z-index: 100; background: #0a0a0f; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .fullscreen-overlay.show { display: flex; }
    
    ::-webkit-scrollbar { display: none; }
    .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    .favorite-heart{
      font-size:24px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ef4444;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

    // Format number
    function fmt(n, prefix = '', suffix = '') {
      return prefix + Math.floor(n).toLocaleString('en-US') + suffix;
    }

    // Create stars
    function createStars() {
      const el = document.getElementById('stars');
      for (let i = 0; i < 30; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDuration = (8 + Math.random() * 12) + 's';
        s.style.animationDelay = Math.random() * 10 + 's';
        el.appendChild(s);
      }
    }

    // Render categories
    function renderCategories() {
      const el = document.getElementById('categories');
      el.innerHTML = categories.map(c => 
        `<div class="category-chip ${c.id === activeCat ? 'active' : ''}" data-cat="${c.id}">${c.label}</div>`
      ).join('');

        chip.onclick = () => {

          activeCat = chip.dataset.cat;

          // RESET NAV COLORS

        class="glass-card p-5 cursor-pointer hover:scale-[1.02] transition-all category-view-card"
        data-category="${c.id}"
      >

        <div class="text-3xl mb-3">
          ${c.label.split(' ')[0]}
        </div>

        <div class="font-semibold text-white text-sm">
          ${c.label.replace(/^.\s/, '')}
        </div>

        <div class="text-xs text-gray-500 mt-1">
          ${
            counters.filter(x => x.cat === c.id).length
          } counters
        </div>

      </div>

    `)
    .join('');

  document.querySelectorAll('.category-view-card')
    .forEach(card => {

      card.onclick = () => {

        activeCat = card.dataset.category;

        setNav('home');

        renderCategories();
        renderFeed();

        // AUTO SCROLL ACTIVE CATEGORY CHIP INTO VIEW
        setTimeout(() => {

          const activeChip = document.querySelector('.category-chip.active');

          if (activeChip) {

            activeChip.scrollIntoView({
              behavior: 'smooth',
              inline: 'center',
              block: 'nearest'
            });

          }

        }, 100);

        document.getElementById('main-content').scrollTo({
          top: 0,
          behavior: 'smooth'
        });

      };

    });

}


// Render feed
function renderFeed() {
  const el = document.getElementById('counter-feed');

  const filtered =
    activeCat === 'all'
      ? counters
      : counters.filter(c => c.cat === activeCat);

  el.innerHTML = filtered
    .map(
      (c, i) => `
      <div class="glass-card p-5 animate-float cursor-pointer counter-card"
           style="animation-delay:${i * 0.05}s"
           data-counter-id="${c.id}">

        <div class="flex items-start justify-between">

          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-lg">${c.icon}</span>
              <span class="text-sm text-gray-300 font-medium">${c.title}</span>
            </div>

            <div
                class="mono font-bold mt-2 leading-tight break-all
                      text-[clamp(1.15rem,4vw,1.6rem)]"
                id="card-${c.id}"
              >
              ${fmt(currentValues[c.id], c.prefix, c.suffix)}
            </div>

            <p class="text-xs text-gray-500 mt-1">
              ${
                c.rate > 0
                  ? '+' + Math.round(c.rate * 60).toLocaleString() + '/min'
                  : 'Constant'
              }
            </p>
          </div>

          <div class="flex flex-col items-center justify-start ml-3">

            <button class="heart-btn p-2 rounded-lg hover:bg-white/10 transition"
                    data-heart-id="${c.id}">

                    <span class="favorite-heart"
                          style="color:${favorites.has(c.id) ? '#ef4444' : '#666'}">
                      ♥
                    </span>

            </button>

            <div class="relative flex items-center justify-center gap-2 mt-8">
              
              <span class="w-2 h-2 rounded-full bg-green-400 pulse-live"></span>

              <span class="text-[10px] text-green-400 uppercase tracking-wider">
                Live
              </span>

            </div>

          </div>
        </div>
      </div>
    `
    )
    .join('');

lucide.createIcons();

  // Card click
  el.querySelectorAll('.counter-card').forEach(card => {
    card.addEventListener('click', () => {
      openFullscreen(card.dataset.counterId);
    });
  });

  // Favorite click
el.querySelectorAll('.heart-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();

    const id = btn.dataset.heartId;

    const heart = btn.querySelector('.favorite-heart');

    if (favorites.has(id)) {
      favorites.delete(id);
      heart.style.color = '#666';
    } else {
      favorites.add(id);
      heart.style.color = '#ef4444';
    }

    localStorage.setItem(
      'favorites',
      JSON.stringify([...favorites])
    );
  });
});
}


    // Fullscreen
    let fsId = null;
    function openFullscreen(id) {
      fsId = id;
      const c = counters.find(x => x.id === id);
      document.getElementById('fs-title').textContent = c.icon + ' ' + c.title;
      document.getElementById('fs-counter').textContent = fmt(currentValues[id], c.prefix, c.suffix);
      document.getElementById('fullscreen').classList.add('show');
    }
    document.getElementById('fs-close').onclick = () => {
      document.getElementById('fullscreen').classList.remove('show');
      fsId = null;
    };

    // Update loop
    function tick() {
      const elapsed = (Date.now() - startTime) / 1000;
      counters.forEach(c => {
        currentValues[c.id] = c.base + (c.rate * elapsed);
        const el = document.getElementById('card-' + c.id);
        if (el) el.textContent = fmt(currentValues[c.id], c.prefix, c.suffix);
      });
      // Counter Battle
      document.getElementById('battle-left').textContent =
        fmt(currentValues['emails']);

      document.getElementById('battle-right').textContent =
        fmt(currentValues['insta']);
      // Fullscreen
      if (fsId) {
        const c = counters.find(x => x.id === fsId);
        document.getElementById('fs-counter').textContent = fmt(currentValues[fsId], c.prefix, c.suffix);
      }
      requestAnimationFrame(tick);
    }

    // Init
    createStars();
    renderCategories();
    renderFeed();
    tick();
    lucide.createIcons();

    document.getElementById('cat-scroll-left').onclick = () => {
      document.getElementById('categories').scrollBy({
        left: -300,
        behavior: 'smooth'
      });
    };

    document.getElementById('cat-scroll-right').onclick = () => {
      document.getElementById('categories').scrollBy({
        left: 300,
        behavior: 'smooth'
      });
    };

    const mainContent = document.getElementById('main-content');
    const scrollTopBtn = document.getElementById('scroll-top-btn');

    // Show / Hide button
    mainContent.addEventListener('scroll', () => {

      if (mainContent.scrollTop > 500) {

      scrollTopBtn.classList.remove('hidden');

      requestAnimationFrame(() => {

        scrollTopBtn.classList.add('flex');

        requestAnimationFrame(() => {

          scrollTopBtn.classList.remove(
            'opacity-0',
            'translate-y-4'
          );

          scrollTopBtn.classList.add(
            'opacity-100',
            'translate-y-0'
          );

        });

      });

      } else {

        scrollTopBtn.classList.add(
          'opacity-0',
          'translate-y-4'
        );

        scrollTopBtn.classList.remove(
          'opacity-100',
          'translate-y-0'
        );

        setTimeout(() => {
          if (mainContent.scrollTop <= 500) {
            scrollTopBtn.classList.remove('flex');
            scrollTopBtn.classList.add('hidden');
          }
        }, 300);

      }

    });

    // Smooth scroll to top
    scrollTopBtn.onclick = () => {

      mainContent.scrollTo({
        top: 0,
        behavior: 'smooth'
      });

    };

    // Navigation
    let currentView = 'home';
function setNav(view) {

  currentView = view;

  document.querySelectorAll('[id^="nav-"]').forEach(btn => {
    btn.classList.remove('text-indigo-400');
    btn.classList.add('text-gray-500');
  });

  // HOME
  if (view === 'home') {


    document.getElementById('nav-home')
      .classList.remove('text-gray-500');

    document.getElementById('nav-home')
      .classList.add('text-indigo-400');

    // SHOW HERO COUNTER CARD
    document.getElementById('hero-counter-card')
      .classList.remove('hidden');


    // SHOW CATEGORY FILTER BAR
    document.querySelector('.px-5.mb-4')
      .classList.remove('hidden');

    // SHOW COUNTERS
    document.getElementById('counter-feed')
      .classList.remove('hidden');

    // HIDE CATEGORY GRID
    document.getElementById('categories-view')
      .classList.add('hidden');

    renderCategories();
    renderFeed();

  }

  // CATEGORIES
  else if (view === 'categories') {

    // RESET FILTER CHIP
    activeCat = 'all';

    renderCategories();

    // HIDE HERO COUNTER CARD
    document.getElementById('hero-counter-card')
      .classList.add('hidden');

    // HIDE CATEGORY FILTER BAR
    document.querySelector('.px-5.mb-4')
      .classList.add('hidden');

    document.getElementById('nav-cat')
      .classList.remove('text-gray-500');

    document.getElementById('nav-cat')
      .classList.add('text-indigo-400');

    // HIDE COUNTERS
    document.getElementById('counter-feed')
      .classList.add('hidden');

    // SHOW CATEGORY GRID
    document.getElementById('categories-view')
      .classList.remove('hidden');

    renderCategoriesView();

  }

  // FAVORITES
  else if (view === 'favorites') {

    document.getElementById('nav-fav')
      .classList.remove('text-gray-500');

    document.getElementById('nav-fav')
      .classList.add('text-indigo-400');

    // HIDE HERO COUNTER CARD
    document.getElementById('hero-counter-card')
      .classList.add('hidden');

    // SHOW CATEGORY FILTER BAR
    document.querySelector('.px-5.mb-4')
      .classList.remove('hidden');

    // SHOW COUNTERS
    document.getElementById('counter-feed')
      .classList.remove('hidden');

    // HIDE CATEGORY GRID
    document.getElementById('categories-view')
      .classList.add('hidden');

    // HIDE CATEGORY FILTER BAR
    document.querySelector('.px-5.mb-4')
      .classList.add('hidden');

    const el = document.getElementById('counter-feed');

    // EMPTY STATE
    if (favorites.size === 0) {

      el.innerHTML = `
        <div class="text-center py-12 text-gray-500">
          No favorites yet. Add some counters to get started!
        </div>
      `;

      return;

    }

    // CLEAR BUTTON
    const clearBtn = `
      <div class="flex justify-end mb-3">
        <button
          id="clear-favorites"
          class="px-4 py-2 rounded-xl
                 bg-red-500/10 border border-red-500/20
                 text-red-400 text-sm font-medium
                 hover:bg-red-500/20
                 transition"
        >
          Clear All
        </button>
      </div>
    `;

    const filtered = counters.filter(c => favorites.has(c.id));

    // RENDER FAVORITES
    el.innerHTML =
      clearBtn +
      filtered.map((c, i) => `
        <div
          class="glass-card p-5 animate-float cursor-pointer counter-card"
          style="animation-delay:${i * 0.05}s"
          data-counter-id="${c.id}"
        >

          <div class="flex items-start justify-between">

            <div class="flex-1">

              <div class="flex items-center gap-2 mb-1">
                <span class="text-lg">${c.icon}</span>

                <span class="text-sm text-gray-300 font-medium">
                  ${c.title}
                </span>
              </div>

              <div
                class="mono font-bold mt-2 leading-tight break-all
                       text-[clamp(1.15rem,4vw,1.6rem)]"
                id="card-${c.id}"
              >
                ${fmt(currentValues[c.id], c.prefix, c.suffix)}
              </div>

              <p class="text-xs text-gray-500 mt-1">
                ${
                  c.rate > 0
                    ? '+' + Math.round(c.rate * 60).toLocaleString() + '/min'
                    : 'Constant'
                }
              </p>

            </div>

            <div class="flex flex-col items-center justify-start ml-3">

              <button
                class="heart-btn p-2 rounded-lg hover:bg-white/10 transition"
                data-heart-id="${c.id}"
              >

                <span class="favorite-heart" style="color:#ef4444">
                  ♥
                </span>

              </button>

              <div class="relative flex items-center justify-center gap-2 mt-8">

                <span class="w-2 h-2 rounded-full bg-green-400 pulse-live"></span>

                <span class="text-[10px] text-green-400 uppercase tracking-wider">
                  Live
                </span>

              </div>

            </div>

          </div>

        </div>
      `).join('');

    // FULLSCREEN
    el.querySelectorAll('.counter-card').forEach(card => {

      card.onclick = (e) => {

        if (e.target.closest('.heart-btn')) return;

        openFullscreen(card.dataset.counterId);

      };

    });

    // REMOVE FAVORITE
    el.querySelectorAll('.heart-btn').forEach(btn => {

      btn.addEventListener('click', e => {

        e.stopPropagation();

        const id = btn.dataset.heartId;

        favorites.delete(id);

        localStorage.setItem(
          'favorites',
          JSON.stringify([...favorites])
        );

        setNav('favorites');

      });

    });

    // CLEAR ALL
    const clearFavBtn = document.getElementById('clear-favorites');

    if (clearFavBtn) {

      clearFavBtn.onclick = () => {

        favorites.clear();

        localStorage.setItem(
          'favorites',
          JSON.stringify([])
        );

        setNav('favorites');

      };

    }

  }

}

    document.getElementById('nav-home').onclick = () => {

      activeCat = 'all';

      renderCategories();

      setNav('home');

      // AUTO SCROLL CATEGORY BAR TO START
      document.getElementById('categories').scrollTo({
        left: 0,
        behavior: 'smooth'
      });

      // AUTO SCROLL PAGE TO TOP
      document.getElementById('main-content').scrollTo({
        top: 0,
        behavior: 'smooth'
      });

    };
    document.getElementById('nav-cat').onclick = () => setNav('categories');
    document.getElementById('nav-fav').onclick = () => setNav('favorites');

    const defaultConfig = {

    };
