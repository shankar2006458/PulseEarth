<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EarthNow</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Outfit:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #fff; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes pulse-glow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes float-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes star-drift { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100%) translateX(20px); opacity: 0; } }
    
    .animate-float { animation: float-up 0.6s ease-out forwards; opacity: 0; }
    .pulse-live { animation: pulse-glow 1.5s ease-in-out infinite; }
    
    .glass-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      transition: all 0.3s ease;
    }
    .glass-card:hover, .glass-card:active {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.15);
      transform: scale(1.02);
    }
    
    .digit-roller { display: inline-block; overflow: hidden; height: 1em; line-height: 1; vertical-align: bottom; }
    .digit-roller span { display: block; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
    
    .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: star-drift linear infinite; }
    
    .category-chip { white-space: nowrap; padding: 8px 16px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; font-size: 14px; }
    .category-chip.active, .category-chip:hover { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.5); }
    
    .bottom-nav { background: rgba(10,10,15,0.95); border-top: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(20px); }
    
    .fullscreen-overlay { position: fixed; inset: 0; z-index: 100; background: #0a0a0f; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .fullscreen-overlay.show { display: flex; }
    
    ::-webkit-scrollbar { display: none; }
    .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    .favorite-heart{
      font-size:24px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ef4444;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full overflow-hidden">
  <div id="app" class="h-full w-full flex flex-col relative overflow-hidden">
   <!-- Stars background -->
   <div id="stars" class="absolute inset-0 pointer-events-none overflow-hidden"></div><!-- Main scrollable content -->
   <div id="main-content" class="flex-1 overflow-y-auto no-scroll pb-20 relative z-10">
    <!-- Hero -->
    <div class="px-5 pt-12 pb-6">
     <p id="hero-text" class="text-gray-400 text-sm mb-1">The world is moving right now.</p>
     <h1 id="app-title" class="text-2xl font-bold mb-6">EarthNow</h1>
     <div class="glass-card p-6 text-center">
      <div class="flex items-center justify-center gap-2 mb-2">
       <span class="w-2 h-2 rounded-full bg-green-400 pulse-live"></span> <span class="text-xs text-green-400 uppercase tracking-wider">Live</span>
      </div>
      <p class="text-gray-400 text-sm mb-2">Emails Sent Today</p>
      <div id="hero-counter" class="mono text-4xl font-bold text-white"></div>
      <p class="text-xs text-gray-500 mt-2">Updated 0.2s ago</p>
     </div>
    </div><!-- Categories -->
    <div class="px-5 mb-4">
     <div id="categories" class="flex gap-2 overflow-x-auto no-scroll py-1"></div>
    </div><!-- Counter cards -->
    <div id="counter-feed" class="px-5 space-y-3 pb-6"></div>
   </div><!-- Bottom nav -->
   <div class="bottom-nav fixed bottom-0 left-0 right-0 flex justify-around py-3 z-50"><button id="nav-home" class="flex flex-col items-center gap-1 text-indigo-400 transition"><i data-lucide="home" style="width:20px;height:20px"></i><span class="text-[10px]">Home</span></button> <button id="nav-cat" class="flex flex-col items-center gap-1 text-gray-500 transition"><i data-lucide="grid" style="width:20px;height:20px"></i><span class="text-[10px]">Categories</span></button> <button id="nav-explore" class="flex flex-col items-center gap-1 text-gray-500 transition"><i data-lucide="compass" style="width:20px;height:20px"></i><span class="text-[10px]">Explore</span></button> <button id="nav-fav" class="flex flex-col items-center gap-1 text-gray-500 transition"><i data-lucide="heart" style="width:20px;height:20px"></i><span class="text-[10px]">Favorites</span></button>
   </div><!-- Fullscreen overlay -->
   <div id="fullscreen" class="fullscreen-overlay">
    <button id="fs-close" class="absolute top-6 right-6 text-gray-400"><i data-lucide="x" style="width:28px;height:28px"></i></button>
    <p id="fs-title" class="text-gray-400 text-lg mb-4"></p>
    <div id="fs-counter" class="mono text-5xl md:text-7xl font-bold text-white text-center px-4"></div>
    <div class="flex items-center gap-2 mt-4">
     <span class="w-2 h-2 rounded-full bg-green-400 pulse-live"></span> <span class="text-xs text-green-400 uppercase tracking-wider">Live</span>
      
    </div>
    <p class="absolute bottom-6 text-[11px] text-gray-500 tracking-[0.2em] uppercase">
      Developed By ~ Shankar Prasad Pyke 
    </p>
   </div>
  </div>
  <script>
    // Data
    const counters = [
      { id: 'pop', icon: '🌍', title: 'World Population', cat: 'world', base: 8194000000, rate: 2.5, prefix: '', suffix: '' },
      { id: 'births', icon: '👶', title: 'Births Today', cat: 'world', base: 284000, rate: 4.3, prefix: '', suffix: '' },
      { id: 'deaths', icon: '💀', title: 'Deaths Today', cat: 'world', base: 118000, rate: 1.8, prefix: '', suffix: '' },
      { id: 'emails', icon: '📧', title: 'Emails Sent Today', cat: 'internet', base: 124847000000, rate: 3800, prefix: '', suffix: '' },
      { id: 'google', icon: '🔍', title: 'Google Searches', cat: 'internet', base: 8500000000, rate: 2200, prefix: '', suffix: '' },
      { id: 'yt', icon: '▶️', title: 'YouTube Videos Watched', cat: 'internet', base: 1200000000, rate: 1400, prefix: '', suffix: '' },
      { id: 'gamers', icon: '🎮', title: 'Active Gamers Right Now', cat: 'gaming', base: 3492222, rate: 12, prefix: '', suffix: '' },
      { id: 'debt', icon: '💰', title: 'Global Debt', cat: 'economy', base: 317483194003211, rate: 12000, prefix: '$', suffix: '' },
      { id: 'ai', icon: '🤖', title: 'AI Prompts Generated', cat: 'ai', base: 892000000, rate: 680, prefix: '', suffix: '' },
      { id: 'sat', icon: '🛰️', title: 'Satellites in Orbit', cat: 'space', base: 10532, rate: 0.001, prefix: '', suffix: '' },
      { id: 'flights', icon: '✈️', title: 'Flights Currently Flying', cat: 'world', base: 12847, rate: 0.5, prefix: '', suffix: '' },
      { id: 'co2', icon: '🌫️', title: 'CO₂ Emitted Today (tons)', cat: 'environment', base: 110000000, rate: 1200, prefix: '', suffix: '' },
      { id: 'btc', icon: '₿', title: 'Bitcoin Transactions', cat: 'economy', base: 742000, rate: 4.2, prefix: '', suffix: '' },
      { id: 'coffee', icon: '☕', title: 'Cups of Coffee Drunk', cat: 'world', base: 2800000000, rate: 950, prefix: '', suffix: '' },
      { id: 'insta', icon: '❤️', title: 'Instagram Likes', cat: 'internet', base: 5200000000, rate: 3200, prefix: '', suffix: '' },
      { id: 'netflix', icon: '🎬', title: 'Minutes Watched on Netflix', cat: 'internet', base: 420000000, rate: 380, prefix: '', suffix: '' },
      { id: 'trees_cut', icon: '🪓', title: 'Trees Cut Down Today', cat: 'environment', base: 41000000, rate: 28, prefix: '', suffix: '' },
      { id: 'trees_plant', icon: '🌱', title: 'Trees Planted Today', cat: 'environment', base: 14000000, rate: 8, prefix: '', suffix: '' },
      { id: 'iss', icon: '🚀', title: 'ISS Speed (km/h)', cat: 'space', base: 27600, rate: 0, prefix: '', suffix: '' },
      { id: 'plastic', icon: '🌊', title: 'Ocean Plastic Added (kg)', cat: 'environment', base: 22000000, rate: 15, prefix: '', suffix: '' },
      { id: 'packages', icon: '📦', title: 'Packages Delivered Today', cat: 'world', base: 68000000, rate: 42, prefix: '', suffix: '' },
      { id: 'food', icon: '🍕', title: 'Food Orders Made Today', cat: 'world', base: 320000000, rate: 180, prefix: '', suffix: '' },
      { id: 'energy', icon: '⚡', title: 'Electricity Used (MWh)', cat: 'energy', base: 67000000, rate: 520, prefix: '', suffix: '' },
    ];

    const categories = [
      { id: 'all', label: '🌐 All' },
      { id: 'world', label: '🌍 World' },
      { id: 'space', label: '📡 Space' },
      { id: 'gaming', label: '🎮 Gaming' },
      { id: 'economy', label: '💰 Economy' },
      { id: 'environment', label: '🌱 Environment' },
      { id: 'ai', label: '🤖 AI' },
      { id: 'internet', label: '📱 Internet' },
      { id: 'energy', label: '⚡ Energy' },
    ];

    let activeCat = 'all';
    let currentValues = {};
    let startTime = Date.now();
    let favorites = new Set(
      JSON.parse(localStorage.getItem('favorites') || '[]')
    );

    // Init values
    counters.forEach(c => { currentValues[c.id] = c.base; });

    // Format number
    function fmt(n, prefix = '', suffix = '') {
      return prefix + Math.floor(n).toLocaleString('en-US') + suffix;
    }

    // Create stars
    function createStars() {
      const el = document.getElementById('stars');
      for (let i = 0; i < 30; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDuration = (8 + Math.random() * 12) + 's';
        s.style.animationDelay = Math.random() * 10 + 's';
        el.appendChild(s);
      }
    }

    // Render categories
    function renderCategories() {
      const el = document.getElementById('categories');
      el.innerHTML = categories.map(c => 
        `<div class="category-chip ${c.id === activeCat ? 'active' : ''}" data-cat="${c.id}">${c.label}</div>`
      ).join('');
      el.querySelectorAll('.category-chip').forEach(chip => {
        chip.onclick = () => { activeCat = chip.dataset.cat; renderCategories(); renderFeed(); };
      });
    }


// Render feed
function renderFeed() {
  const el = document.getElementById('counter-feed');
  const filtered =
    activeCat === 'all'
      ? counters
      : counters.filter(c => c.cat === activeCat);

  el.innerHTML = filtered
    .map(
      (c, i) => `
      <div class="glass-card p-5 animate-float cursor-pointer counter-card"
           style="animation-delay:${i * 0.05}s"
           data-counter-id="${c.id}">

        <div class="flex items-start justify-between">

          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-lg">${c.icon}</span>
              <span class="text-sm text-gray-300 font-medium">${c.title}</span>
            </div>

            <div class="mono text-2xl font-bold mt-2" id="card-${c.id}">
              ${fmt(currentValues[c.id], c.prefix, c.suffix)}
            </div>

            <p class="text-xs text-gray-500 mt-1">
              ${
                c.rate > 0
                  ? '+' + Math.round(c.rate * 60).toLocaleString() + '/min'
                  : 'Constant'
              }
            </p>
          </div>

          <div class="flex flex-col items-center justify-start ml-3">

            <button class="heart-btn p-2 rounded-lg hover:bg-white/10 transition"
                    data-heart-id="${c.id}">

                    <span class="favorite-heart"
                          style="color:${favorites.has(c.id) ? '#ef4444' : '#666'}">
                      ♥
                    </span>

            </button>

            <div class="relative flex items-center justify-center mt-1">
              
              <span class="absolute w-3 h-3 rounded-full bg-green-400 opacity-30 animate-ping"></span>

              <span class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_12px_rgba(74,222,128,1)]"></span>

            </div>

          </div>
        </div>
      </div>
    `
    )
    .join('');

lucide.createIcons();

  // Card click
  el.querySelectorAll('.counter-card').forEach(card => {
    card.addEventListener('click', () => {
      openFullscreen(card.dataset.counterId);
    });
  });

  // Favorite click
el.querySelectorAll('.heart-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();

    const id = btn.dataset.heartId;

    const heart = btn.querySelector('.favorite-heart');

    if (favorites.has(id)) {
      favorites.delete(id);
      heart.style.color = '#666';
    } else {
      favorites.add(id);
      heart.style.color = '#ef4444';
    }

    localStorage.setItem(
      'favorites',
      JSON.stringify([...favorites])
    );
  });
});
}
    // Fullscreen
    let fsId = null;
    function openFullscreen(id) {
      fsId = id;
      const c = counters.find(x => x.id === id);
      document.getElementById('fs-title').textContent = c.icon + ' ' + c.title;
      document.getElementById('fs-counter').textContent = fmt(currentValues[id], c.prefix, c.suffix);
      document.getElementById('fullscreen').classList.add('show');
    }
    document.getElementById('fs-close').onclick = () => {
      document.getElementById('fullscreen').classList.remove('show');
      fsId = null;
    };

    // Update loop
    function tick() {
      const elapsed = (Date.now() - startTime) / 1000;
      counters.forEach(c => {
        currentValues[c.id] = c.base + (c.rate * elapsed);
        const el = document.getElementById('card-' + c.id);
        if (el) el.textContent = fmt(currentValues[c.id], c.prefix, c.suffix);
      });
      // Hero counter (emails)
      document.getElementById('hero-counter').textContent = fmt(currentValues['emails']);
      // Fullscreen
      if (fsId) {
        const c = counters.find(x => x.id === fsId);
        document.getElementById('fs-counter').textContent = fmt(currentValues[fsId], c.prefix, c.suffix);
      }
      requestAnimationFrame(tick);
    }

    // Init
    createStars();
    renderCategories();
    renderFeed();
    tick();
    lucide.createIcons();

    // Navigation
    let currentView = 'home';
    function setNav(view) {
      currentView = view;
      document.querySelectorAll('[id^="nav-"]').forEach(btn => btn.classList.remove('text-indigo-400'));
      document.querySelectorAll('[id^="nav-"]').forEach(btn => btn.classList.add('text-gray-500'));
      
      if (view === 'home') {
        document.getElementById('nav-home').classList.remove('text-gray-500');
        document.getElementById('nav-home').classList.add('text-indigo-400');
        activeCat = 'all';
        renderCategories();
        renderFeed();
      } else if (view === 'favorites') {
        document.getElementById('nav-fav').classList.remove('text-gray-500');
        document.getElementById('nav-fav').classList.add('text-indigo-400');
        const el = document.getElementById('counter-feed');
        if (favorites.size === 0) {
          el.innerHTML = '<div class="text-center py-12 text-gray-500">No favorites yet. Add some counters to get started!</div>';
        } else {
          const filtered = counters.filter(c => favorites.has(c.id));
          el.innerHTML = filtered.map((c, i) => `
            <div class="glass-card p-5 animate-float cursor-pointer counter-card" style="animation-delay:${i * 0.05}s" data-counter-id="${c.id}">
              <div class="flex items-start justify-between">
                <div class="flex-1" style="pointer-events: none;">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="text-lg">${c.icon}</span>
                    <span class="text-sm text-gray-300 font-medium">${c.title}</span>
                  </div>
                  <div class="mono text-2xl font-bold mt-2" id="card-${c.id}">${fmt(currentValues[c.id], c.prefix, c.suffix)}</div>
                  <p class="text-xs text-gray-500 mt-1">${c.rate > 0 ? '+' + Math.round(c.rate * 60).toLocaleString() + '/min' : 'Constant'}</p>
                </div>
                <div class="flex flex-col items-center justify-start ml-3">
                  <button class="heart-btn p-2 rounded-lg hover:bg-white/10 transition" data-heart-id="${c.id}" style="pointer-events: auto;">
                    <span class="favorite-heart">♥</span>
                  </button>
                  <div class="relative flex items-center justify-center -mt-1">
                    
                    <span class="absolute w-3 h-3 rounded-full bg-green-400 opacity-30 animate-ping"></span>

                    <span class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_12px_rgba(74,222,128,1)]"></span>

                  </div>
                </div>
              </div>
            </div>
          `).join('');
          el.querySelectorAll('.counter-card').forEach(card => {
            card.onclick = (e) => {
              if (e.target.closest('.heart-btn')) return;
              openFullscreen(card.dataset.counterId);
            };
          });
          el.querySelectorAll('.heart-btn').forEach(btn => {
            btn.addEventListener('click', e => {
              e.stopPropagation();

              const id = btn.dataset.heartId;

              favorites.delete(id);

              localStorage.setItem(
                'favorites',
                JSON.stringify([...favorites])
              );

              setNav('favorites');


            });
          });
        }
      }
    }

    document.getElementById('nav-home').onclick = () => setNav('home');
    document.getElementById('nav-cat').onclick = () => setNav('home');
    document.getElementById('nav-explore').onclick = () => setNav('home');
    document.getElementById('nav-fav').onclick = () => setNav('favorites');

    // Element SDK
    const defaultConfig = {
      hero_text: 'The world is moving right now.',
      app_title: 'EarthNow',
      background_color: '#0a0a0f',
      card_color: '#1a1a2e',
      text_color: '#ffffff',
      accent_color: '#6366f1',
      secondary_color: '#22c55e',
      font_family: 'Outfit',
      font_size: 16
    };

  </script>
</html>
